name: Auto Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/workflows/auto-release.yaml"

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
            CURRENT_VERSION="0.0.0"
          else
            RANGE="${LATEST_TAG}..HEAD"
            CURRENT_VERSION="${LATEST_TAG#v}"
            CURRENT_VERSION="${CURRENT_VERSION%%-*}"
          fi

          COMMITS=$(git log --pretty=format:"%s" "$RANGE" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="none"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+!:' || echo "$msg" | grep -qi 'BREAKING CHANGE'; then
              BUMP="major"
              break
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No releasable commits found, skipping."
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          DATE=$(date -u +%Y%m%d)
          PRE_VERSION="${NEXT_VERSION}-alpha.${DATE}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=${PRE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${PRE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${PRE_VERSION} (bump: ${BUMP})"

      - name: Update Cargo.toml
        if: steps.version.outputs.skip != 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml
          cargo generate-lockfile 2>/dev/null || true

      - name: Commit and tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin master --tags

      - name: Generate release notes
        if: steps.version.outputs.skip != 'true'
        id: notes
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD^"
          fi

          NOTES=""
          BREAKING=""
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+!:' || echo "$msg" | grep -qi 'BREAKING CHANGE'; then
              BREAKING="${BREAKING}\n- ${msg}"
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              FEATURES="${FEATURES}\n- ${msg}"
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              FIXES="${FIXES}\n- ${msg}"
            elif echo "$msg" | grep -qE '^(chore|docs|ci|refactor|perf|test)(\(.+\))?:'; then
              OTHER="${OTHER}\n- ${msg}"
            fi
          done <<< "$(git log --pretty=format:"%s" "$RANGE" 2>/dev/null || git log --pretty=format:"%s")"

          {
            echo "notes<<NOTES_EOF"
            if [ -n "$BREAKING" ]; then
              echo "## Breaking Changes"
              echo -e "$BREAKING"
              echo ""
            fi
            if [ -n "$FEATURES" ]; then
              echo "## Features"
              echo -e "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "## Bug Fixes"
              echo -e "$FIXES"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "## Other Changes"
              echo -e "$OTHER"
              echo ""
            fi
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger release build
        if: steps.version.outputs.skip != 'true'
        run: gh workflow run release.yaml --ref "${{ steps.version.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
