name: "[Reusable] Release"

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions: {}

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - run: mkdir -p release

      - name: Collect zip files
        run: find artifacts -name "*.zip" -exec cp {} release/ \;

      - name: Generate plugin.json
        run: deno run --allow-read --allow-write .github/scripts/release/create-plugin-json.ts

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            release/*.zip
            plugin.json
            deployment/schema.json
          prerelease: ${{ contains(inputs.tag, '-alpha.') }}
          generate_release_notes: true
