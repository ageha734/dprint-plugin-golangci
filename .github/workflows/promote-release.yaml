name: Promote Release

on:
  release:
    types:
      - edited

jobs:
  promote:
    if: >-
      !github.event.release.prerelease &&
      contains(github.event.release.tag_name, '-alpha.')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Determine stable version
        id: version
        run: |
          PRE_TAG="${{ github.event.release.tag_name }}"
          STABLE_VERSION="${PRE_TAG#v}"
          STABLE_VERSION="${STABLE_VERSION%%-*}"
          echo "version=${STABLE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${STABLE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pre_tag=${PRE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Promoting ${PRE_TAG} -> v${STABLE_VERSION}"

      - name: Create stable tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const preTag = '${{ steps.version.outputs.pre_tag }}';
            const stableTag = '${{ steps.version.outputs.tag }}';
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${preTag}`,
            });
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${stableTag}`,
              sha: ref.object.sha,
            });
            console.log(`Created tag ${stableTag} at ${ref.object.sha}`);

      - run: mkdir -p release-assets

      - name: Download pre-release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ steps.version.outputs.pre_tag }}" -D release-assets

      - name: Create stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${{ steps.version.outputs.tag }}"
          --title "${{ steps.version.outputs.tag }}"
          --generate-notes
          --latest
          release-assets/*

      - name: Delete pre-release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const preTag = '${{ steps.version.outputs.pre_tag }}';
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: preTag,
            });
            await github.rest.repos.deleteRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
            });
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${preTag}`,
            });
            console.log(`Deleted pre-release ${preTag}`);
