name: "[Reusable] E2E"

on:
  workflow_call:

jobs:
  e2e:
    name: "golangci ${{ matrix.golangci }} / go ${{ matrix.go }} / ${{ matrix.mode }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - golangci: "2.5.0"
            go: "1.24"
            mode: installed
          - golangci: "2.4.0"
            go: "1.24"
            mode: installed
          - golangci: "1.64.8"
            go: "1.24"
            mode: installed
          - golangci: "1.63.4"
            go: "1.23"
            mode: installed
          - golangci: "2.5.0"
            go: "1.24"
            mode: auto-install
          - golangci: "1.64.8"
            go: "1.24"
            mode: auto-install

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "${{ matrix.go }}"
          cache: false

      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        if: matrix.mode == 'installed'
        with:
          version: "v${{ matrix.golangci }}"
          install-only: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dprint-plugin-golangci-linux-x86_64
          path: target/release

      - run: chmod +x target/release/dprint-plugin-golangci

      - name: Install dprint
        run: curl -fsSL https://dprint.dev/install.sh | sh && echo "$HOME/.dprint/bin" >> $GITHUB_PATH

      - name: Run E2E
        run: |
          chmod +x .github/scripts/e2e/run.sh
          .github/scripts/e2e/run.sh "${{ github.workspace }}/target/release/dprint-plugin-golangci"
