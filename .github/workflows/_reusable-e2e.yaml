name: "[Reusable] E2E"

on:
  workflow_call:

jobs:
  e2e:
    name: "golangci ${{ matrix.golangci }} / go ${{ matrix.go }} / ${{ matrix.mode }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - golangci: "2.5.0"
            go: "1.24"
            mode: installed
          - golangci: "2.4.0"
            go: "1.24"
            mode: installed
          - golangci: "1.64.8"
            go: "1.24"
            mode: installed
          - golangci: "1.63.4"
            go: "1.23"
            mode: installed
          - golangci: "2.5.0"
            go: "1.24"
            mode: auto-install
          - golangci: "1.64.8"
            go: "1.24"
            mode: auto-install

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ matrix.go }}"
          cache: false

      - name: Install golangci-lint (manual)
        if: matrix.mode == 'installed'
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin v${{ matrix.golangci }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dprint-plugin-golangci-linux-x86_64
          path: target/release

      - run: chmod +x target/release/dprint-plugin-golangci

      - name: Install dprint
        run: curl -fsSL https://dprint.dev/install.sh | sh && echo "$HOME/.dprint/bin" >> $GITHUB_PATH

      - name: Run E2E
        run: |
          chmod +x .github/scripts/e2e/run.sh
          .github/scripts/e2e/run.sh "${{ github.workspace }}/target/release/dprint-plugin-golangci" "${{ matrix.mode }}" "${{ matrix.golangci }}"
