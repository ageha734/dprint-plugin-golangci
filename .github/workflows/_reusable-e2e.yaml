name: "[Reusable] E2E"

on:
  workflow_call:

jobs:
  e2e:
    name: "${{ matrix.scenario }} / golangci ${{ matrix.golangci }} / ${{ matrix.mode }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # lint-error: detect unfixable lint issues
          - golangci: "2.5.0"
            go: "1.24"
            mode: installed
            scenario: lint-error
          - golangci: "2.4.0"
            go: "1.24"
            mode: installed
            scenario: lint-error
          - golangci: "1.64.8"
            go: "1.24"
            mode: installed
            scenario: lint-error
          - golangci: "1.63.4"
            go: "1.23"
            mode: installed
            scenario: lint-error
          - golangci: "2.5.0"
            go: "1.24"
            mode: auto-install
            scenario: lint-error
          - golangci: "1.64.8"
            go: "1.24"
            mode: auto-install
            scenario: lint-error

          # fix: auto-fix gofmt violations
          - golangci: "2.5.0"
            go: "1.24"
            mode: installed
            scenario: fix
          - golangci: "1.64.8"
            go: "1.24"
            mode: installed
            scenario: fix

          # clean: no lint errors passes cleanly
          - golangci: "2.5.0"
            go: "1.24"
            mode: installed
            scenario: clean
          - golangci: "1.64.8"
            go: "1.24"
            mode: installed
            scenario: clean

          # config-path: custom config file path
          - golangci: "2.5.0"
            go: "1.24"
            mode: installed
            scenario: config-path
          - golangci: "1.64.8"
            go: "1.24"
            mode: installed
            scenario: config-path

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ matrix.go }}"
          cache: false

      - name: Install golangci-lint (manual)
        if: matrix.mode == 'installed'
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin v${{ matrix.golangci }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dprint-plugin-golangci-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/dprint-plugin-golangci

      - run: chmod +x target/${{ matrix.target }}/release/dprint-plugin-golangci

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install dprint
        run: curl -fsSL https://dprint.dev/install.sh | sh && echo "$HOME/.dprint/bin" >> $GITHUB_PATH

      - name: Run E2E
        run: >-
          deno run --allow-run --allow-read --allow-write --allow-env
          .github/scripts/e2e/run.ts
          "${{ github.workspace }}/target/${{ matrix.target }}/release/dprint-plugin-golangci"
          "${{ matrix.mode }}"
          "${{ matrix.golangci }}"
          "${{ matrix.scenario }}"
